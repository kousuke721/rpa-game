<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>簿記トレーナー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Segoe UI',sans-serif;background:#f7f5ff;min-height:100vh;padding:12px;color:#1e1530}
.shell{max-width:480px;margin:0 auto}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 14px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#7c3aed,#5b21b6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;box-shadow:0 2px 8px rgba(124,58,237,.3)}
.logo-txt{font-size:14px;font-weight:700}
.hdr-right{display:flex;gap:7px;align-items:center}
.badge{background:#fff;border:1px solid #ddd6fe;border-radius:99px;padding:4px 10px;font-size:11px;color:#7c3aed;font-weight:600}
.reset-btn{background:#fff;border:1px solid #e0d5f5;border-radius:99px;padding:4px 10px;font-size:11px;color:#9a7fc5;font-weight:600;cursor:pointer;font-family:inherit}
.reset-btn:hover{background:#f5f3ff;color:#7c3aed}

.tab-bar{display:flex;background:#fff;border:1px solid #ede9fe;border-radius:16px;padding:5px;margin-bottom:16px;gap:4px;box-shadow:0 2px 10px rgba(124,58,237,.07)}
.tab-item{flex:1;padding:9px 6px;border-radius:12px;border:none;background:transparent;font-size:11px;font-family:inherit;font-weight:600;color:#9986c0;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab-item.active{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.28)}
.tab-icon{font-size:15px;line-height:1}
.tab-label{font-size:10px}

.hero{background:linear-gradient(135deg,#5b21b6 0%,#7c3aed 55%,#a855f7 100%);border-radius:18px;padding:20px 18px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 6px 24px rgba(124,58,237,.3)}
.hero::before{content:"";position:absolute;right:-50px;top:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07)}
.hero-tag{font-size:10px;letter-spacing:2px;opacity:.8;margin-bottom:6px;font-weight:700;text-transform:uppercase;position:relative;z-index:1}
.hero-title{font-size:20px;font-weight:700;margin-bottom:5px;position:relative;z-index:1}
.hero-sub{font-size:12px;opacity:.88;line-height:1.65;margin-bottom:14px;position:relative;z-index:1}
.hero-row{display:flex;gap:8px;margin-bottom:12px;position:relative;z-index:1}
.hero-stat{flex:1;background:rgba(255,255,255,.15);border-radius:11px;padding:9px 10px;text-align:center;border:1px solid rgba(255,255,255,.2)}
.hero-stat-n{font-size:17px;font-weight:700}
.hero-stat-l{font-size:10px;opacity:.8;margin-top:2px}
.pbar-bg{background:rgba(255,255,255,.2);border-radius:99px;height:5px;overflow:hidden;position:relative;z-index:1}
.pbar-fill{height:100%;background:#fff;border-radius:99px;transition:width .5s}

.sec-label{font-size:11px;font-weight:700;color:#7c3aed;letter-spacing:.5px;margin:2px 2px 10px;display:flex;align-items:center;gap:6px;text-transform:uppercase}
.sec-label::before{content:"";width:3px;height:11px;background:linear-gradient(180deg,#7c3aed,#a855f7);border-radius:2px}

.lesson-card{background:#fff;border:1px solid #ede9fe;border-radius:14px;margin-bottom:10px;cursor:pointer;box-shadow:0 1px 4px rgba(124,58,237,.06);transition:box-shadow .15s,transform .15s;overflow:hidden}
.lesson-card:hover{box-shadow:0 4px 14px rgba(124,58,237,.12);transform:translateY(-1px)}
.lesson-card.read{background:linear-gradient(135deg,#fff,#f5f3ff);border-color:#c4b5fd}
.lesson-card-head{display:flex;align-items:center;gap:12px;padding:13px 15px}
.lesson-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.lesson-card-body{flex:1;min-width:0}
.lesson-read-pill{font-size:9px;padding:2px 7px;border-radius:99px;background:#ede9fe;color:#5b21b6;font-weight:700;display:inline-block;margin-bottom:3px}
.lesson-card-title{font-size:14px;font-weight:600;color:#1e1530;margin-bottom:2px}
.lesson-card-desc{font-size:11px;color:#6b6080;line-height:1.4}
.lesson-card-arr{color:#c4b5fd;font-size:18px;flex-shrink:0}

.lesson-back{background:#fff;border:1px solid #ddd6fe;border-radius:99px;padding:7px 14px;font-size:12px;color:#7c3aed;cursor:pointer;font-family:inherit;font-weight:600;margin-bottom:12px;display:inline-flex;align-items:center;gap:4px}
.lesson-back:hover{background:#f5f3ff}
.lesson-content{background:#fff;border-radius:16px;border:1px solid #ede9fe;overflow:hidden;margin-bottom:14px}
.lesson-content-hero{padding:18px;background:linear-gradient(135deg,#f5f3ff,#ede9fe);border-bottom:1px solid #ede9fe}
.lesson-content-icon{font-size:28px;margin-bottom:8px}
.lesson-content-title{font-size:17px;font-weight:700;color:#1e1530;margin-bottom:5px}
.lesson-content-lead{font-size:12px;color:#4a3f6b;line-height:1.75}
.lesson-section{padding:16px 18px;border-bottom:1px solid #f5f3ff}
.lesson-section:last-child{border-bottom:none}
.lesson-section-title{font-size:13px;font-weight:700;color:#5b21b6;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.lesson-section-title::before{content:"";width:3px;height:12px;background:linear-gradient(180deg,#7c3aed,#a855f7);border-radius:2px;flex-shrink:0}
.lesson-body{font-size:13px;color:#2e2040;line-height:1.8}
.lesson-body p{margin-bottom:10px}
.lesson-body p:last-child{margin-bottom:0}

.info-box{background:#f5f3ff;border:1px solid #ddd6fe;border-radius:10px;padding:12px 14px;margin:10px 0;font-size:12px;color:#2e1065;line-height:1.7}
.info-box strong{color:#5b21b6;font-weight:700}
.tip-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px 14px;margin:10px 0;font-size:12px;color:#14532d;line-height:1.7}
.tip-box strong{font-weight:700;color:#15803d}
.warn-box{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 14px;margin:10px 0;font-size:12px;color:#78350f;line-height:1.7}

.boki-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
.boki-table th{padding:8px 10px;font-weight:700;font-size:11px;color:#fff}
.boki-table th.karikata{background:#7c3aed}
.boki-table th.kashikata{background:#a855f7}
.boki-table td{padding:8px 10px;border-bottom:1px solid #ede9fe;color:#2e2040;line-height:1.55;text-align:center}
.boki-table tr:nth-child(even) td{background:#faf9ff}

.jiwake-box{background:#1e1a2e;border-radius:12px;padding:14px 16px;margin:10px 0;font-family:'SF Mono','Consolas',monospace;font-size:12px;line-height:1.8;color:#e2d9f3}
.jiwake-box .kari{color:#c084fc;font-weight:700}
.jiwake-box .kashi{color:#86efac;font-weight:700}
.jiwake-box .amt{color:#fcd34d}
.jiwake-box .label{color:#9986c0;font-size:11px}

.fs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.fs-card{border-radius:10px;padding:10px 12px}
.fs-card.bs{background:#ede9fe;border:1px solid #ddd6fe}
.fs-card.pl{background:#fae8ff;border:1px solid #f5d0fe}
.fs-card-title{font-size:11px;font-weight:700;color:#5b21b6;margin-bottom:6px;text-align:center}
.fs-item{font-size:11px;color:#2e2040;padding:3px 0;border-bottom:1px solid rgba(124,58,237,.1)}
.fs-item:last-child{border-bottom:none}
.fs-item.plus{color:#15803d;font-weight:600}
.fs-item.minus{color:#9d174d;font-weight:600}

.step-list{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.step-item{display:flex;gap:10px;align-items:flex-start}
.step-num{flex-shrink:0;width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.step-text{font-size:12px;color:#2e2040;line-height:1.7;flex:1}
.step-text strong{color:#5b21b6;font-weight:600}

.lesson-done-btn{width:100%;padding:13px;background:linear-gradient(135deg,#7c3aed,#5b21b6);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(124,58,237,.3);transition:all .15s;margin-top:4px}
.lesson-done-btn:hover{transform:translateY(-1px)}
.lesson-done-btn.read{background:linear-gradient(135deg,#6d28d9,#4c1d95)}

/* quiz */
.back{background:#fff;border:1px solid #ddd6fe;border-radius:99px;padding:7px 14px;font-size:12px;color:#7c3aed;cursor:pointer;font-family:inherit;font-weight:600;margin-bottom:12px;display:inline-flex;align-items:center;gap:4px}
.back:hover{background:#f5f3ff}
.sum-card{background:#fff;border-radius:13px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;border:1px solid #ede9fe}
.sum-num{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.sum-tag{font-size:10px;color:#9986c0;letter-spacing:.8px;font-weight:700;text-transform:uppercase}
.sum-name{font-size:14px;font-weight:600;color:#1e1530}
.prog-wrap{background:#fff;border-radius:11px;padding:11px 14px;margin-bottom:12px;border:1px solid #ede9fe}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:#9986c0;font-weight:600;margin-bottom:7px}
.prog-bar{height:5px;background:#f5f3ff;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:99px;transition:width .4s}
.ch-card{background:#fff;border-radius:15px;padding:17px;margin-bottom:10px;border:1px solid #ede9fe;box-shadow:0 2px 10px rgba(124,58,237,.06)}
.ch-head{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.ch-type{font-size:10px;padding:3px 10px;border-radius:99px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.ch-type.choice{background:#fce7f3;color:#9d174d}
.ch-type.fill{background:#fef3c7;color:#92400e}
.ch-type.order{background:#ede9fe;color:#3730a3}
.ch-type.jiwake{background:#dcfce7;color:#14532d}
.ch-qnum{font-size:11px;color:#c4b5fd;font-weight:600}
.ch-q{font-size:13px;font-weight:500;color:#1e1530;line-height:1.75;margin-bottom:15px}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:13px}
.opt{padding:12px 14px;border:1px solid #ede9fe;border-radius:12px;font-size:13px;background:#faf9ff;text-align:left;color:#1e1530;line-height:1.55;display:flex;align-items:flex-start;gap:10px;width:100%;font-family:inherit;cursor:pointer;transition:all .12s}
.opt:hover:not(:disabled){background:#f5f3ff;border-color:#c4b5fd}
.opt-mk{flex-shrink:0;width:24px;height:24px;border-radius:7px;background:#fff;border:1px solid #ddd6fe;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#9986c0;margin-top:1px}
.opt.correct{background:#f5f3ff;border-color:#7c3aed;color:#2e1065}
.opt.correct .opt-mk{background:#7c3aed;color:#fff;border-color:#7c3aed}
.opt.wrong{background:#fff0f5;border-color:#ec4899;color:#500724}
.opt.wrong .opt-mk{background:#ec4899;color:#fff;border-color:#ec4899}
.opt:disabled{cursor:default}
.fill-row{display:flex;gap:8px;margin-bottom:13px;flex-wrap:wrap}
.fill-row input{flex:1;min-width:180px;padding:11px 13px;border:1px solid #ddd6fe;border-radius:10px;font-size:13px;background:#faf9ff;color:#1e1530;transition:all .15s;font-family:inherit}
.fill-row input:focus{outline:none;border-color:#7c3aed;background:#fff;box-shadow:0 0 0 3px rgba(124,58,237,.12)}
.fill-row input.correct{border-color:#7c3aed;background:#f5f3ff;color:#2e1065}
.fill-row input.wrong{border-color:#ec4899;background:#fff0f5;color:#500724}

/* 仕訳問題用 */
.jiwake-q{background:#1e1a2e;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:12px;color:#e2d9f3;line-height:1.7}
.jiwake-inputs{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:12px}
.jiwake-inputs input{padding:10px 12px;border:1px solid #ddd6fe;border-radius:10px;font-size:13px;background:#faf9ff;color:#1e1530;font-family:inherit;text-align:center}
.jiwake-inputs input:focus{outline:none;border-color:#7c3aed;background:#fff}
.jiwake-inputs input.correct{border-color:#7c3aed;background:#f5f3ff;color:#2e1065}
.jiwake-inputs input.wrong{border-color:#ec4899;background:#fff0f5;color:#500724}
.jiwake-sep{text-align:center;font-size:18px;color:#9986c0;font-weight:700}
.jiwake-label{text-align:center;font-size:10px;color:#9986c0;font-weight:600;margin-bottom:4px}

.ord-list{display:flex;flex-direction:column;gap:7px;margin-bottom:13px}
.ord-item{background:#faf9ff;border:1px solid #ede9fe;border-radius:10px;padding:10px 12px;font-size:12.5px;display:flex;align-items:flex-start;gap:9px;cursor:grab;line-height:1.55;color:#1e1530}
.ord-item:hover{border-color:#c4b5fd}
.ord-item:active{cursor:grabbing;opacity:.5}
.ord-item.drag-over-top{border-top:3px solid #7c3aed;padding-top:8px}
.ord-item.drag-over-bot{border-bottom:3px solid #7c3aed;padding-bottom:8px}
.ord-n{flex-shrink:0;width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.ord-txt{flex:1}
.ord-hdl{color:#c4b5fd;font-size:13px;flex-shrink:0;letter-spacing:-1px}

.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:10px 18px;border:1px solid #ddd6fe;border-radius:10px;background:#fff;font-size:13px;color:#1e1530;font-family:inherit;font-weight:600;cursor:pointer;transition:all .12s}
.btn:hover:not(:disabled){background:#f5f3ff;border-color:#c4b5fd}
.btn-p{background:linear-gradient(135deg,#7c3aed,#5b21b6);border-color:transparent;color:#fff;box-shadow:0 3px 10px rgba(124,58,237,.3)}
.btn-p:hover:not(:disabled){transform:translateY(-1px)}
.fb{padding:13px 14px;border-radius:12px;display:flex;gap:10px;align-items:flex-start;margin-top:11px;font-size:12px;line-height:1.7}
.fb.ok{background:#f5f3ff;border:1px solid #c4b5fd;color:#2e1065}
.fb.ng{background:#fff0f5;border:1px solid #fbcfe8;color:#500724}
.fb-icon{flex-shrink:0;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:1px}
.fb.ok .fb-icon{background:#7c3aed;color:#fff}
.fb.ng .fb-icon{background:#ec4899;color:#fff}
.fb-head{font-weight:700;font-size:13px;margin-bottom:3px}
.fb-code{margin-top:8px;background:#1e1a2e;color:#e2d9f3;padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.65}
.nav{display:flex;justify-content:flex-end;margin-top:13px}

.comp{background:#fff;border-radius:18px;padding:30px 20px;text-align:center;border:1px solid #ddd6fe;box-shadow:0 4px 20px rgba(124,58,237,.1)}
.comp-ic{width:68px;height:68px;background:linear-gradient(135deg,#7c3aed,#5b21b6);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:30px;color:#fff;margin-bottom:13px;animation:pop .5s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.comp-title{font-size:19px;font-weight:700;color:#1e1530;margin-bottom:4px}
.comp-sub{font-size:12px;color:#9986c0;margin-bottom:18px;line-height:1.65}
.comp-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.final{margin-top:18px;padding:14px;background:#f5f3ff;border-radius:12px;font-size:12px;color:#2e1065;line-height:1.75;border:1px solid #ddd6fe}

.modal-overlay{position:fixed;inset:0;background:rgba(30,21,48,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:#fff;border-radius:18px;padding:24px 22px;max-width:320px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(124,58,237,.25)}
.modal-ic{font-size:32px;margin-bottom:10px}
.modal-title{font-size:16px;font-weight:700;color:#1e1530;margin-bottom:8px}
.modal-sub{font-size:12px;color:#9986c0;line-height:1.65;margin-bottom:18px}
.modal-btns{display:flex;gap:8px;justify-content:center}
.btn-danger{background:linear-gradient(135deg,#ec4899,#be185d);border-color:transparent;color:#fff}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div class="logo">
      <div class="logo-icon">簿</div>
      <div class="logo-txt">会計・簿記 超入門</div>
    </div>
    <div class="hdr-right">
      <div class="badge" id="badge">0/4</div>
      <button class="reset-btn" onclick="confirmReset()">リセット</button>
    </div>
  </div>
  <div id="modal"></div>

  <div class="tab-bar">
    <button class="tab-item active" id="tab-lesson" onclick="switchTab('lesson')">
      <span class="tab-icon">📖</span>
      <span class="tab-label">講座</span>
    </button>
    <button class="tab-item" id="tab-quiz" onclick="switchTab('quiz')">
      <span class="tab-icon">✅</span>
      <span class="tab-label">練習問題</span>
    </button>
    <button class="tab-item" id="tab-jiwake" onclick="switchTab('jiwake')">
      <span class="tab-icon">📝</span>
      <span class="tab-label">仕訳練習</span>
    </button>
    <button class="tab-item" id="tab-glossary" onclick="switchTab('glossary')">
      <span class="tab-icon">📚</span>
      <span class="tab-label">用語集</span>
    </button>
  </div>

  <div id="app"></div>
</div>

<script>
const LESSONS=[
  {id:'ls1',icon:'🏦',color:'#ede9fe',title:'お金の流れを記録する',desc:'簿記とは何か・なぜ必要か',
   lead:'簿記とは、会社のお金の出入りをルールに沿って記録する技術です。家計簿の企業版だと思ってください。',
   sections:[
     {title:'簿記が必要な理由',body:`
<p>会社はたくさんの取引をします。商品を売る、材料を買う、給料を払う……これらを<strong>正確に記録しないと</strong>、いくら儲かっているか・借金がいくらあるかがわかりません。</p>
<div class="info-box"><strong>簿記がないと…</strong><br>・税金の計算ができない<br>・銀行にお金を借りられない<br>・経営判断ができない<br>・不正や横領が発覚しない</div>
<p>だから全ての会社は、法律で帳簿（きちんとした記録）をつけることが義務付けられています。</p>`},
     {title:'簿記の基本ルール',body:`
<p>簿記では、お金の取引を<strong>必ず2つの面から記録</strong>します。これを「複式簿記」といいます。</p>
<div class="jiwake-box"><span class="label">例）現金100円で商品を買った</span>
<br><span class="kari">（借方）仕入 100円</span>　／　<span class="kashi">（貸方）現金 100円</span></div>
<div class="tip-box"><strong>💡 ポイント</strong><br>「何かが増えたら、何かが減る」または「何かが増えたら、別の何かも増える」という2面性を必ず記録するのが複式簿記の特徴です。</div>`},
     {title:'簿記でわかること',body:`
<div class="step-list">
  <div class="step-item"><div class="step-num">1</div><div class="step-text"><strong>会社の財産状況</strong>　何がいくらあるか（資産・負債・純資産）</div></div>
  <div class="step-item"><div class="step-num">2</div><div class="step-text"><strong>儲けの状況</strong>　いくら売れていくら費用がかかったか（収益・費用）</div></div>
  <div class="step-item"><div class="step-num">3</div><div class="step-text"><strong>現金の動き</strong>　どこからお金が入りどこに出ていったか</div></div>
</div>`}
   ]},

  render();
}

function render(){
  if(S.tab==='lesson') renderLesson();
  else if(S.tab==='quiz') renderQuiz();
  else if(S.tab==='jiwake') renderJiwake();
  else renderGlossary();
  upBadge();
}

/* ===== LESSON ===== */
function renderLesson(){
  if(S.lessonView==='list') renderLessonList();
  else renderLessonDetail();
}
function renderLessonList(){
  const rc=LESSONS.filter(l=>S.read[l.id]).length;
  let h=`<div class="hero">
    <div class="hero-tag">Accounting Basics</div>
    <div class="hero-title">会計・簿記 超入門講座</div>
    <div class="hero-sub">知識ゼロから始める会計の基礎。4章で面接に必要な知識が身につきます。</div>
    <div class="hero-row">
      <div class="hero-stat"><div class="hero-stat-n">${rc}/4</div><div class="hero-stat-l">読了章数</div></div>
      <div class="hero-stat"><div class="hero-stat-n">約60</div><div class="hero-stat-l">分で完成</div></div>
      <div class="hero-stat"><div class="hero-stat-n">${Math.round(rc/4*100)}%</div><div class="hero-stat-l">達成率</div></div>
    </div>
    <div class="pbar-bg"><div class="pbar-fill" style="width:${Math.round(rc/4*100)}%"></div></div>
  </div>
  <div class="sec-label">4章構成</div>`;
  LESSONS.forEach((ls,i)=>{
    const r=S.read[ls.id];
    h+=`<div class="lesson-card${r?' read':''}" onclick="openLesson(${i})">
      <div class="lesson-card-head">
        <div class="lesson-icon" style="background:${ls.color}">${ls.icon}</div>
        <div class="lesson-card-body">
          ${r?'<span class="lesson-read-pill">✓ 読了</span>':''}
          <div class="lesson-card-title">Chapter ${i+1}｜${ls.title}</div>
          <div class="lesson-card-desc">${ls.desc}</div>
        </div>
        <div class="lesson-card-arr">›</div>
      </div>
    </div>`;
  });
  document.getElementById('app').innerHTML=h;
}
function openLesson(i){S.lessonView='detail';S.currentLesson=i;renderLessonDetail()}
function renderLessonDetail(){
  const ls=LESSONS[S.currentLesson];const r=S.read[ls.id];
  let h=`<button class="lesson-back" onclick="backLesson()">← 一覧に戻る</button>
  <div class="lesson-content">
    <div class="lesson-content-hero">
      <div class="lesson-content-icon">${ls.icon}</div>
      <div class="lesson-content-title">Chapter ${S.currentLesson+1}｜${ls.title}</div>
      <div class="lesson-content-lead">${ls.lead}</div>
    </div>`;
  ls.sections.forEach(sec=>{
    h+=`<div class="lesson-section">
      <div class="lesson-section-title">${sec.title}</div>
      <div class="lesson-body">${sec.body}</div>
    </div>`;
  });
  h+=`</div>
  <button class="lesson-done-btn${r?' read':''}" onclick="markRead(${S.currentLesson})">${r?'✓ 読了済み':'この章を読了にする'}</button>`;
  document.getElementById('app').innerHTML=h;
}
function backLesson(){S.lessonView='list';renderLessonList()}
function markRead(i){S.read[LESSONS[i].id]=true;save();renderLessonDetail()}

/* ===== QUIZ ===== */
function renderQuiz(){
  if(S.quizView==='list') renderQuizList();
  else if(S.quizView==='playing') renderQuizPlay();
  else renderQuizComp();
}
function renderQuizList(){
  const dc=QUIZZES.filter(q=>S.done[q.id]).length;
  let h=`<div class="hero">
    <div class="hero-tag">Quiz</div>
    <div class="hero-title">理解度チェック</div>
    <div class="hero-sub">4章・計16問で知識を定着させましょう</div>
    <div class="hero-row">
      <div class="hero-stat"><div class="hero-stat-n">${dc}/4</div><div class="hero-stat-l">完了章数</div></div>
      <div class="hero-stat"><div class="hero-stat-n">16</div><div class="hero-stat-l">総問題数</div></div>
    </div>
    <div class="pbar-bg"><div class="pbar-fill" style="width:${Math.round(dc/4*100)}%"></div></div>
  </div>
  <div class="sec-label">チャプター選択</div>`;
  QUIZZES.forEach((qz,i)=>{
    const done=S.done[qz.id];const prev=i===0||S.done[QUIZZES[i-1].id];const locked=!prev;
    h+=`<div class="lesson-card${done?' read':''}" ${!locked?`onclick="startQuiz(${i})"`:''} style="${locked?'opacity:.5;cursor:default':''}">
      <div class="lesson-card-head">
        <div class="lesson-icon" style="background:#ede9fe">${done?'✅':'📝'}</div>
        <div class="lesson-card-body">
          ${done?'<span class="lesson-read-pill">✓ 完了</span>':locked?'<span class="lesson-read-pill" style="background:#f1f5f9;color:#64748b">🔒</span>':''}
          <div class="lesson-card-title">${qz.tag}｜${qz.name}</div>
          <div class="lesson-card-desc">${qz.ch.length}問</div>
        </div>
        <div class="lesson-card-arr">›</div>
      </div>
    </div>`;
  });
  document.getElementById('app').innerHTML=h;
}
function startQuiz(i){S.quizView='playing';S.quizLi=i;S.quizCi=0;S.ans={};S.sel=null;S.fill='';initQ();renderQuizPlay()}
function initQ(){
  const ch=QUIZZES[S.quizLi].ch[S.quizCi];
  if(ch.t==='order'){
    const a=ch.items.map((_,i)=>i);
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    let t=0;while(a.every((v,i)=>v===ch.correct[i])&&t++<5)for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    S.ord=a;
  }
}
function renderQuizPlay(){
  const qz=QUIZZES[S.quizLi];const ch=qz.ch[S.quizCi];const tot=qz.ch.length;
  const ansd=S.ans[S.quizCi]!==undefined;
  const pct=Math.round(((S.quizCi+(ansd?1:0))/tot)*100);
  let h=`<button class="back" onclick="backQuiz()">← 一覧に戻る</button>
  <div class="sum-card">
    <div class="sum-num">${S.quizLi+1}</div>
    <div><div class="sum-tag">${qz.tag}</div><div class="sum-name">${qz.name}</div></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-label"><span>Q${S.quizCi+1}/${tot}</span><span>${pct}%</span></div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="ch-card">
    <div class="ch-head"><span class="ch-type ${ch.t}">${ch.k}</span><span class="ch-qnum">Q${S.quizCi+1}</span></div>
    <div class="ch-q">${ch.q}</div>`;
  if(ch.t==='choice'){
    h+=`<div class="opts">`;
    ch.opts.forEach((o,i)=>{
      let c='opt';
      if(ansd){if(i===ch.ans)c+=' correct';else if(i===S.sel&&i!==ch.ans)c+=' wrong';}
      h+=`<button class="${c}" ${ansd?'disabled':''} onclick="chkC(${i})"><span class="opt-mk">${['A','B','C','D'][i]}</span><span class="opt-txt">${o}</span></button>`;
    });
    h+=`</div>`;
  }else if(ch.t==='fill'){
    const a=S.ans[S.quizCi];const ic=a===undefined?'':a?'correct':'wrong';
    h+=`<div class="fill-row"><input id="fi" type="text" placeholder="${ch.ph||''}" value="${esca(S.fill)}" ${a!==undefined?'disabled':''} class="${ic}"><${a===undefined?`button class="btn btn-p" onclick="chkF()">確認</button`:'span'}></div>`;
  }else if(ch.t==='order'){
    h+=`<div class="ord-list" id="ordlist">`;
    S.ord.forEach((oi,pos)=>{
      h+=`<div class="ord-item" draggable="true" data-pos="${pos}"><span class="ord-n">${pos+1}</span><span class="ord-txt">${esc(ch.items[oi])}</span><span class="ord-hdl">⋮⋮</span></div>`;
    });
    h+=`</div>`;
    if(!ansd) h+=`<button class="btn btn-p" onclick="chkOrd()">答え合わせ</button>`;
  }
  if(ansd){
    const ok=S.ans[S.quizCi];
    h+=`<div class="fb ${ok?'ok':'ng'}"><span class="fb-icon">${ok?'✓':'×'}</span><div><div class="fb-head">${ok?'正解！':'不正解'}</div><div>${ch.exp}</div></div></div>
    <div class="nav"><button class="btn btn-p" onclick="nextQ()">${S.quizCi+1<tot?'次の問題 →':'完了 →'}</button></div>`;
  }
  h+=`</div>`;
  document.getElementById('app').innerHTML=h;
  if(ch.t==='fill'){
    const inp=document.getElementById('fi');
    if(inp&&S.ans[S.quizCi]===undefined){inp.addEventListener('input',e=>S.fill=e.target.value);inp.addEventListener('keydown',e=>{if(e.key==='Enter')chkF()});inp.focus();}
  }
  if(ch.t==='order') setupDD();
}
function backQuiz(){S.quizView='list';renderQuizList()}
function chkC(i){S.sel=i;S.ans[S.quizCi]=(i===QUIZZES[S.quizLi].ch[S.quizCi].ans);renderQuizPlay()}
function chkF(){
  const ch=QUIZZES[S.quizLi].ch[S.quizCi];const v=S.fill.trim();
  const n=s=>s.toLowerCase().replace(/\s+/g,'');
  S.ans[S.quizCi]=ch.correct.some(c=>n(c)===n(v));renderQuizPlay();
}
function chkOrd(){S.ans[S.quizCi]=S.ord.every((v,i)=>v===QUIZZES[S.quizLi].ch[S.quizCi].correct[i]);renderQuizPlay()}
function nextQ(){
  if(S.quizCi+1<QUIZZES[S.quizLi].ch.length){S.quizCi++;S.sel=null;S.fill='';initQ();renderQuizPlay();}
  else{S.done[QUIZZES[S.quizLi].id]=true;save();S.quizView='comp';renderQuizComp();}
}
function renderQuizComp(){
  const qz=QUIZZES[S.quizLi];const isLast=S.quizLi===QUIZZES.length-1;const allDone=QUIZZES.every(q=>S.done[q.id]);
  let h=`<div class="comp"><div class="comp-ic">✓</div>
    <div class="comp-title">${qz.tag} クリア！</div>
    <div class="comp-sub">${qz.name}の理解度チェック完了</div>
    <div class="comp-btns">
      ${!isLast?`<button class="btn btn-p" onclick="startQuiz(${S.quizLi+1})">次へ →</button>`:''}
      <button class="btn" onclick="backQuiz()">一覧へ</button>
    </div>`;
  if(allDone) h+=`<div class="final">🎉 <strong>全章完了！</strong><br>簿記の基礎知識が身につきました。次は仕訳練習タブで実際の仕訳を体で覚えましょう！</div>`;
  h+=`</div>`;
  document.getElementById('app').innerHTML=h;
}
function setupDD(){
  const area=document.getElementById('ordlist');if(!area)return;
  let dp=null;
  area.querySelectorAll('.ord-item').forEach(el=>{
    el.addEventListener('dragstart',e=>{dp=+el.dataset.pos;el.style.opacity='.4';e.dataTransfer.effectAllowed='move'});
    el.addEventListener('dragend',e=>{el.style.opacity='1';area.querySelectorAll('.ord-item').forEach(x=>x.classList.remove('drag-over-top','drag-over-bot'))});
    el.addEventListener('dragover',e=>{e.preventDefault();area.querySelectorAll('.ord-item').forEach(x=>x.classList.remove('drag-over-top','drag-over-bot'));const mid=el.getBoundingClientRect().top+el.offsetHeight/2;el.classList.add(e.clientY<mid?'drag-over-top':'drag-over-bot')});
    el.addEventListener('drop',e=>{e.preventDefault();const mid=el.getBoundingClientRect().top+el.offsetHeight/2;let tp=+el.dataset.pos;if(e.clientY>=mid)tp++;if(dp===null)return;const it=S.ord.splice(dp,1)[0];if(tp>dp)tp--;S.ord.splice(tp,0,it);dp=null;renderQuizPlay()});
  });
}

/* ===== JIWAKE ===== */
function renderJiwake(){
  const jw=JIWAKES[S.jiwakeIdx];const ansd=S.jiwakeAns!==null;
  const ok=S.jiwakeAns;
  let h=`<div class="hero">
    <div class="hero-tag">仕訳練習</div>
    <div class="hero-title">仕訳を体で覚えよう</div>
    <div class="hero-sub">借方・貸方の勘定科目名を入力して答え合わせ。全${JIWAKES.length}問あります。</div>
    <div class="hero-row">
      <div class="hero-stat"><div class="hero-stat-n">${S.jiwakeIdx+1}/${JIWAKES.length}</div><div class="hero-stat-l">現在の問題</div></div>
    </div>
  </div>
  <div class="ch-card">
    <div class="ch-head"><span class="ch-type jiwake">仕訳</span><span class="ch-qnum">No.${S.jiwakeIdx+1}</span></div>
    <div class="ch-q">次の取引を仕訳してください：<br><strong>「${jw.q}」</strong></div>
    <div class="jiwake-q">金額：<strong>${jw.amt.toLocaleString()}円</strong><br>借方と貸方の勘定科目名を入力してください</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px;text-align:center">
      <div style="font-size:11px;color:#7c3aed;font-weight:700">借方（左）</div>
      <div style="font-size:11px;color:#a855f7;font-weight:700">貸方（右）</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <input id="kari" type="text" placeholder="例：現金" value="${esca(S.jiwakeKari)}" ${ansd?'disabled':''} class="${ansd?(S.jiwakeKari.replace(/\s/g,'')===jw.kari?'correct':'wrong'):''}" style="padding:10px 12px;border:1px solid #ddd6fe;border-radius:10px;font-size:13px;background:#faf9ff;color:#1e1530;font-family:inherit;text-align:center">
      <input id="kashi" type="text" placeholder="例：売上" value="${esca(S.jiwakeKashi)}" ${ansd?'disabled':''} class="${ansd?(S.jiwakeKashi.replace(/\s/g,'')===jw.kashi?'correct':'wrong'):''}" style="padding:10px 12px;border:1px solid #ddd6fe;border-radius:10px;font-size:13px;background:#faf9ff;color:#1e1530;font-family:inherit;text-align:center">
    </div>`;

  if(!ansd){
    h+=`<button class="btn btn-p" onclick="chkJiwake()">答え合わせ</button>`;
  }else{
    h+=`<div class="fb ${ok?'ok':'ng'}">
      <span class="fb-icon">${ok?'✓':'×'}</span>
      <div>
        <div class="fb-head">${ok?'正解！':'正解はこちら'}</div>
        <div>${jw.exp}</div>
        ${!ok?`<div class="fb-code">借方：${jw.kari} ／ 貸方：${jw.kashi}</div>`:''}
      </div>
    </div>
    <div class="nav"><button class="btn btn-p" onclick="nextJiwake()">${S.jiwakeIdx+1<JIWAKES.length?'次の問題 →':'最初に戻る 🔄'}</button></div>`;
  }
  h+=`</div>`;
  document.getElementById('app').innerHTML=h;

  if(!ansd){
    const ki=document.getElementById('kari');const ka=document.getElementById('kashi');
    if(ki){ki.addEventListener('input',e=>S.jiwakeKari=e.target.value);ki.focus();}
    if(ka) ka.addEventListener('input',e=>S.jiwakeKashi=e.target.value);
  }
}
function chkJiwake(){
  const jw=JIWAKES[S.jiwakeIdx];
  const k=S.jiwakeKari.trim().replace(/\s/g,'');
  const ka=S.jiwakeKashi.trim().replace(/\s/g,'');
  S.jiwakeAns=(k===jw.kari && ka===jw.kashi);
  renderJiwake();
}
function nextJiwake(){
  S.jiwakeIdx=(S.jiwakeIdx+1)%JIWAKES.length;
  S.jiwakeAns=null;S.jiwakeKari='';S.jiwakeKashi='';
  renderJiwake();
}

/* ===== GLOSSARY ===== */
function renderGlossary(){
  let h=`<div class="hero">
    <div class="hero-tag">用語集</div>
    <div class="hero-title">会計・簿記 用語集</div>
    <div class="hero-sub">面接で出てきそうな${GLOSSARY.length}の用語をまとめました</div>
  </div>
  <div class="sec-label">${GLOSSARY.length}用語</div>`;
  GLOSSARY.forEach(g=>{
    h+=`<div style="background:#fff;border:1px solid #ede9fe;border-radius:12px;padding:12px 14px;margin-bottom:8px">
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px">
        <span style="font-size:15px;font-weight:700;color:#1e1530">${g.term}</span>
        <span style="font-size:11px;color:#9986c0">${g.read}</span>
      </div>
      <div style="font-size:12px;color:#4a3f6b;line-height:1.65">${g.def}</div>
    </div>`;
  });
  document.getElementById('app').innerHTML=h;
}

/* ===== RESET ===== */
function confirmReset(){
  document.getElementById('modal').innerHTML=`<div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal"><div class="modal-ic">⚠️</div>
    <div class="modal-title">進捗をリセットしますか？</div>
    <div class="modal-sub">読了状態・クイズ完了状態がすべて消去されます。</div>
    <div class="modal-btns"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn btn-danger" onclick="doReset()">リセット</button></div>
    </div></div>`;
}
function closeModal(e){if(!e||e.target.classList.contains('modal-overlay'))document.getElementById('modal').innerHTML=''}
function doReset(){
  S.read={};S.done={};S.jiwakeIdx=0;S.jiwakeAns=null;S.jiwakeKari='';S.jiwakeKashi='';
  save();document.getElementById('modal').innerHTML='';render();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function esca(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;')}

render();
</script>
</body>
</html>
