<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HUE / ERPトレーナー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Segoe UI',sans-serif;background:linear-gradient(135deg,#1a0a2e 0%,#2d1b69 45%,#6b3fa0 100%);min-height:100vh;padding:12px;color:#FDFAFF}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 65% 25%,rgba(168,85,247,.14) 0%,transparent 55%),radial-gradient(ellipse at 20% 75%,rgba(224,64,251,.09) 0%,transparent 50%);pointer-events:none;z-index:0}
.shell{max-width:480px;margin:0 auto;position:relative;z-index:1}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 14px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#6B3FA0,#E040FB);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;box-shadow:0 2px 8px rgba(224,64,251,.3)}
.logo-txt{font-size:14px;font-weight:700;color:#fff}
.badge{background:rgba(168,85,247,.2);border:1px solid rgba(168,85,247,.38);border-radius:99px;padding:4px 10px;font-size:11px;color:#d8b4fe;font-weight:600}

.tab-bar{display:flex;background:rgba(26,10,46,.85);border:1px solid rgba(168,85,247,.25);border-radius:20px;padding:5px;margin-bottom:16px;gap:4px;backdrop-filter:blur(20px)}
.tab-item{flex:1;padding:9px 6px;border-radius:14px;border:none;background:transparent;font-size:11px;font-family:inherit;font-weight:600;color:rgba(195,155,211,.5);cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:4px}
.tab-item.active{background:linear-gradient(135deg,rgba(107,63,160,.5),rgba(224,64,251,.3));color:#fff;border:1px solid rgba(224,64,251,.35)}
.tab-item.active svg{stroke:#fff}
.tab-item:not(.active) svg{stroke:rgba(195,155,211,.45)}
.tab-label{font-size:10px;letter-spacing:.2px}

.hero{background:rgba(237,228,255,.1);border:1px solid rgba(168,85,247,.28);border-radius:18px;padding:20px 18px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden;backdrop-filter:blur(8px)}
.hero-tag{font-size:10px;letter-spacing:2px;color:#C39BD3;margin-bottom:6px;font-weight:700;text-transform:uppercase;position:relative;z-index:1}
.hero-title{font-size:20px;font-weight:700;margin-bottom:5px;letter-spacing:-.3px;position:relative;z-index:1;color:#fff}
.hero-sub{font-size:12px;color:rgba(195,155,211,.85);line-height:1.65;margin-bottom:14px;position:relative;z-index:1}
.hero-row{display:flex;gap:8px;margin-bottom:12px;position:relative;z-index:1}
.hero-stat{flex:1;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border-radius:11px;padding:9px 10px;text-align:center;border:1px solid rgba(255,255,255,.15)}
.hero-stat-n{font-size:18px;font-weight:700;line-height:1;color:#fff}
.hero-stat-l{font-size:10px;color:rgba(195,155,211,.8);margin-top:2px;letter-spacing:.3px}
.pbar-bg{background:rgba(255,255,255,.15);border-radius:99px;height:6px;overflow:hidden;position:relative;z-index:1}
.pbar-fill{height:100%;background:linear-gradient(90deg,#A855F7,#E040FB);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

.sec-label{font-size:11px;font-weight:700;color:#C39BD3;letter-spacing:.5px;margin:2px 2px 10px;display:flex;align-items:center;gap:6px;text-transform:uppercase}
.sec-label::before{content:'';width:3px;height:11px;background:linear-gradient(180deg,#A855F7,#E040FB);border-radius:2px}

.lesson-card{background:rgba(237,228,255,.1);border:1px solid rgba(168,85,247,.22);border-radius:14px;margin-bottom:10px;cursor:pointer;backdrop-filter:blur(8px);transition:all .15s;overflow:hidden}
.lesson-card:hover{border-color:rgba(168,85,247,.45);transform:translateY(-1px)}
.lesson-card.read{border-color:rgba(110,231,183,.3)}
.lesson-card-head{display:flex;align-items:center;gap:12px;padding:13px 15px}
.lesson-icon{width:44px;height:44px;border-radius:12px;background:rgba(168,85,247,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lesson-card-body{flex:1;min-width:0}
.lesson-read-pill{font-size:9px;padding:2px 7px;border-radius:99px;background:rgba(110,231,183,.2);color:#6ee7b7;font-weight:700;display:inline-block;margin-bottom:3px;border:1px solid rgba(110,231,183,.3)}
.lesson-card-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:2px}
.lesson-card-desc{font-size:11px;color:rgba(195,155,211,.8);line-height:1.4}
.lesson-card-arr{color:rgba(168,85,247,.5);font-size:18px;flex-shrink:0;transition:transform .15s,color .15s}
.lesson-card:hover .lesson-card-arr{color:#A855F7;transform:translateX(3px)}

.lesson-back{background:rgba(255,255,255,.08);border:1px solid rgba(168,85,247,.3);border-radius:99px;padding:7px 14px;font-size:12px;color:#d8b4fe;cursor:pointer;font-family:inherit;font-weight:600;margin-bottom:12px;display:inline-flex;align-items:center;gap:4px}
.lesson-back:hover{background:rgba(168,85,247,.2)}
.lesson-content{background:rgba(237,228,255,.08);border-radius:16px;border:1px solid rgba(168,85,247,.22);overflow:hidden;margin-bottom:14px;backdrop-filter:blur(8px)}
.lesson-content-hero{padding:18px;background:rgba(168,85,247,.15);border-bottom:1px solid rgba(168,85,247,.2)}
.lesson-content-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6B3FA0,#E040FB);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.lesson-content-title{font-size:17px;font-weight:700;color:#fff;margin-bottom:5px}
.lesson-content-lead{font-size:12px;color:rgba(195,155,211,.85);line-height:1.75}
.lesson-section{padding:16px 18px;border-bottom:1px solid rgba(168,85,247,.12)}
.lesson-section:last-child{border-bottom:none}
.lesson-section-title{font-size:13px;font-weight:700;color:#d8b4fe;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.lesson-section-title::before{content:'';width:3px;height:12px;background:linear-gradient(180deg,#A855F7,#E040FB);border-radius:2px;flex-shrink:0}
.lesson-body{font-size:13px;color:rgba(195,155,211,.9);line-height:1.8}
.lesson-body p{margin-bottom:10px}
.lesson-body p:last-child{margin-bottom:0}

.info-box{background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);border-radius:10px;padding:12px 14px;margin:10px 0;font-size:12px;color:rgba(237,228,255,.9);line-height:1.7}
.info-box strong{color:#d8b4fe;font-weight:700}
.tip-box{background:rgba(110,231,183,.1);border:1px solid rgba(110,231,183,.25);border-radius:10px;padding:12px 14px;margin:10px 0;font-size:12px;color:rgba(110,231,183,.95);line-height:1.7}
.tip-box strong{font-weight:700;color:#6ee7b7}
.warn-box{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:10px;padding:12px 14px;margin:10px 0;font-size:12px;color:rgba(251,191,36,.95);line-height:1.7}

.compare-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
.compare-table th{background:linear-gradient(135deg,#6B3FA0,#E040FB);color:#fff;padding:8px 10px;font-weight:600;font-size:11px;letter-spacing:.3px}
.compare-table td{padding:8px 10px;border-bottom:1px solid rgba(168,85,247,.15);color:rgba(195,155,211,.9);vertical-align:top;line-height:1.55}
.compare-table tr:nth-child(even) td{background:rgba(168,85,247,.06)}
.good{color:#6ee7b7;font-weight:600}

.step-list{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.step-item{display:flex;gap:10px;align-items:flex-start}
.step-num{flex-shrink:0;width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,#6B3FA0,#E040FB);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.step-text{font-size:12px;color:rgba(195,155,211,.9);line-height:1.7;flex:1}
.step-text strong{color:#d8b4fe;font-weight:600}

.usecase-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.usecase-item{background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.22);border-radius:10px;padding:10px 12px}
.usecase-icon{width:28px;height:28px;border-radius:8px;background:rgba(168,85,247,.25);display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.usecase-title{font-size:12px;font-weight:600;color:#fff;margin-bottom:2px}
.usecase-desc{font-size:10px;color:rgba(195,155,211,.7);line-height:1.4}

.interview-box{background:rgba(237,228,255,.08);border:1px solid rgba(168,85,247,.25);border-radius:14px;padding:14px 16px;margin:10px 0;backdrop-filter:blur(8px)}
.interview-q{font-size:12px;font-weight:700;color:#d8b4fe;margin-bottom:8px;display:flex;align-items:flex-start;gap:6px}
.interview-q-icon{flex-shrink:0;width:20px;height:20px;border-radius:6px;background:linear-gradient(135deg,#6B3FA0,#E040FB);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.interview-a{font-size:12px;color:rgba(195,155,211,.85);line-height:1.8;background:rgba(255,255,255,.05);border-radius:10px;padding:12px 14px;border:1px solid rgba(168,85,247,.15)}

.lesson-done-btn{width:100%;padding:13px;background:linear-gradient(135deg,#6B3FA0,#E040FB);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(224,64,251,.3);transition:all .15s;margin-top:4px}
.lesson-done-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(224,64,251,.4)}
.lesson-done-btn.read{background:rgba(110,231,183,.2);border:1px solid rgba(110,231,183,.35);color:#6ee7b7}

.back{background:rgba(255,255,255,.08);border:1px solid rgba(168,85,247,.3);border-radius:99px;padding:7px 14px;font-size:12px;color:#d8b4fe;cursor:pointer;font-family:inherit;font-weight:600;margin-bottom:12px;display:inline-flex;align-items:center;gap:4px}
.back:hover{background:rgba(168,85,247,.2)}
.sum-card{background:rgba(237,228,255,.08);border-radius:13px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;border:1px solid rgba(168,85,247,.22);backdrop-filter:blur(8px)}
.sum-num{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#A855F7,#6B3FA0);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.sum-tag{font-size:10px;color:#C39BD3;letter-spacing:.8px;font-weight:700;text-transform:uppercase}
.sum-name{font-size:14px;font-weight:600;color:#fff}
.prog-wrap{background:rgba(237,228,255,.08);border-radius:11px;padding:11px 14px;margin-bottom:12px;border:1px solid rgba(168,85,247,.2);backdrop-filter:blur(8px)}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:#C39BD3;font-weight:600;margin-bottom:7px}
.prog-bar{height:5px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#A855F7,#E040FB);border-radius:99px;transition:width .4s}
.ch-card{background:rgba(237,228,255,.08);border-radius:15px;padding:17px;margin-bottom:10px;border:1px solid rgba(168,85,247,.22);backdrop-filter:blur(8px)}
.ch-head{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.ch-type{font-size:10px;padding:3px 10px;border-radius:99px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.ch-type.choice{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3)}
.ch-type.fill{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.ch-type.order{background:rgba(168,85,247,.2);color:#d8b4fe;border:1px solid rgba(168,85,247,.35)}
.ch-qnum{font-size:11px;color:#C39BD3;font-weight:600}
.ch-q{font-size:13px;font-weight:500;color:#fff;line-height:1.75;margin-bottom:15px}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:13px}
.opt{padding:12px 14px;border:1px solid rgba(168,85,247,.22);border-radius:12px;font-size:13px;background:rgba(237,228,255,.06);text-align:left;color:rgba(195,155,211,.9);line-height:1.55;display:flex;align-items:flex-start;gap:10px;width:100%;font-family:inherit;cursor:pointer;transition:all .12s}
.opt:hover:not(:disabled){background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4)}
.opt-mk{flex-shrink:0;width:24px;height:24px;border-radius:7px;background:rgba(255,255,255,.08);border:1px solid rgba(168,85,247,.25);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#C39BD3;margin-top:1px}
.opt.correct{background:rgba(110,231,183,.12);border-color:rgba(110,231,183,.4);color:#6ee7b7}
.opt.correct .opt-mk{background:linear-gradient(135deg,#6B3FA0,#E040FB);color:#fff;border-color:transparent}
.opt.wrong{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.35);color:#f87171}
.opt.wrong .opt-mk{background:#f87171;color:#fff;border-color:#f87171}
.opt:disabled{cursor:default}
.fill-row{display:flex;gap:8px;margin-bottom:13px;flex-wrap:wrap}
.fill-row input{flex:1;min-width:180px;padding:11px 13px;border:1px solid rgba(168,85,247,.3);border-radius:10px;font-size:13px;background:rgba(237,228,255,.08);color:#fff;transition:all .15s;font-family:inherit}
.fill-row input::placeholder{color:rgba(195,155,211,.4)}
.fill-row input:focus{outline:none;border-color:#A855F7;background:rgba(168,85,247,.15);box-shadow:0 0 0 3px rgba(168,85,247,.15)}
.fill-row input.correct{border-color:rgba(110,231,183,.5);background:rgba(110,231,183,.1);color:#6ee7b7}
.fill-row input.wrong{border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.08);color:#f87171}
.ord-list{display:flex;flex-direction:column;gap:7px;margin-bottom:13px}
.ord-item{background:rgba(237,228,255,.08);border:1px solid rgba(168,85,247,.22);border-radius:10px;padding:10px 12px;font-size:12.5px;display:flex;align-items:flex-start;gap:9px;cursor:grab;line-height:1.55;color:rgba(195,155,211,.9)}
.ord-item:hover{border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.12)}
.ord-item:active{cursor:grabbing;opacity:.5}
.ord-item.drag-over-top{border-top:3px solid #A855F7;padding-top:8px}
.ord-item.drag-over-bot{border-bottom:3px solid #A855F7;padding-bottom:8px}
.ord-n{flex-shrink:0;width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#6B3FA0,#E040FB);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.ord-txt{flex:1}
.ord-hdl{color:rgba(168,85,247,.4);font-size:13px;flex-shrink:0;letter-spacing:-1px}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:10px 18px;border:1px solid rgba(168,85,247,.3);border-radius:10px;background:rgba(237,228,255,.08);font-size:13px;color:#d8b4fe;font-family:inherit;font-weight:600;cursor:pointer;transition:all .12s}
.btn:hover:not(:disabled){background:rgba(168,85,247,.2);border-color:rgba(168,85,247,.5)}
.btn-p{background:linear-gradient(135deg,#6B3FA0,#E040FB);border-color:transparent;color:#fff;box-shadow:0 3px 10px rgba(224,64,251,.3)}
.btn-p:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(224,64,251,.4)}
.fb{padding:13px 14px;border-radius:12px;display:flex;gap:10px;align-items:flex-start;margin-top:11px;font-size:12px;line-height:1.7}
.fb.ok{background:rgba(110,231,183,.1);border:1px solid rgba(110,231,183,.3);color:rgba(110,231,183,.95)}
.fb.ng{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:rgba(248,113,113,.95)}
.fb-icon{flex-shrink:0;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:1px}
.fb.ok .fb-icon{background:linear-gradient(135deg,#6B3FA0,#E040FB);color:#fff}
.fb.ng .fb-icon{background:#f87171;color:#fff}
.fb-head{font-weight:700;font-size:13px;margin-bottom:3px}
.nav{display:flex;justify-content:flex-end;margin-top:13px}
.comp{background:rgba(237,228,255,.08);border-radius:18px;padding:30px 20px;text-align:center;border:1px solid rgba(168,85,247,.25);backdrop-filter:blur(8px)}
.comp-ic{width:68px;height:68px;background:linear-gradient(135deg,#6B3FA0,#E040FB);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;color:#fff;margin-bottom:13px;box-shadow:0 6px 20px rgba(224,64,251,.35);animation:pop .5s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.comp-title{font-size:19px;font-weight:700;color:#fff;margin-bottom:4px}
.comp-sub{font-size:12px;color:#C39BD3;margin-bottom:18px;line-height:1.65}
.comp-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.final{margin-top:18px;padding:14px;background:rgba(168,85,247,.12);border-radius:12px;font-size:12px;color:rgba(195,155,211,.9);line-height:1.75;border:1px solid rgba(168,85,247,.25)}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div class="logo">
      <div class="logo-icon">H</div>
      <div class="logo-txt">HUE / ERP 面接対策</div>
    </div>
    <div class="badge" id="badge">30分で完成</div>
  </div>

  <div class="tab-bar">
    <button class="tab-item active" id="tab-lesson" onclick="switchTab('lesson')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
      <span class="tab-label">知識インプット</span>
    </button>
    <button class="tab-item" id="tab-quiz" onclick="switchTab('quiz')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span class="tab-label">理解度チェック</span>
    </button>
    <button class="tab-item" id="tab-interview" onclick="switchTab('interview')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span class="tab-label">面接想定問答</span>
    </button>
  </div>

  <div id="app"></div>
</div>

<script>
const LESSONS=[
  {id:'ls1',color:'#6B3FA0',title:'ERPとは何か？',desc:'企業の基幹システムの概念を理解する',
   lead:'ERP（Enterprise Resource Planning）とは、企業の主要な業務データを一つのシステムで統合管理する仕組みです。',
   sections:[
     {title:'ERPが生まれた背景',body:`
<p>昔の企業は、<strong>部門ごとに別々のシステム</strong>を持っていました。経理は経理システム、人事は人事システム、購買は購買システム……と、バラバラに動いていました。</p>
<div class="warn-box"><strong>バラバラなシステムの問題</strong><br>・同じデータを複数の場所に入力する「二重入力」が発生<br>・入力ミスやデータの食い違いが起きやすい<br>・経営者がリアルタイムで全体を把握できない</div>
<p>この問題を解決するために生まれたのが<strong>ERP</strong>です。</p>`},
     {title:'ERPとは何か',body:`
<p>ERPは<strong>「企業全体の情報を一元管理する統合システム」</strong>です。財務・人事・購買・販売・在庫などを一つのデータベースで管理します。</p>

  const ls=LESSONS[S.currentLesson];const r=S.read[ls.id];
  let h=`<button class="lesson-back" onclick="backLesson()">← 一覧に戻る</button>
  <div class="lesson-content">
    <div class="lesson-content-hero">
      <div class="lesson-content-icon">${LESSON_ICONS[S.currentLesson]}</div>
      <div class="lesson-content-title">Chapter ${S.currentLesson+1}｜${ls.title}</div>
      <div class="lesson-content-lead">${ls.lead}</div>
    </div>`;
  ls.sections.forEach(sec=>{
    h+=`<div class="lesson-section"><div class="lesson-section-title">${sec.title}</div><div class="lesson-body">${sec.body}</div></div>`;
  });
  h+=`</div><button class="lesson-done-btn${r?' read':''}" onclick="markRead(${S.currentLesson})">${r?'読了済み':'この章を読了にする'}</button>`;
  document.getElementById('app').innerHTML=h;
}
function backLesson(){S.lessonView='list';renderLessonList()}
function markRead(i){S.read[LESSONS[i].id]=true;save();renderLessonDetail()}

function renderQuiz(){
  if(S.quizView==='list') renderQuizList();
  else if(S.quizView==='playing') renderQuizPlay();
  else renderQuizComp();
}
function renderQuizList(){
  const dc=QUIZZES.filter(q=>S.done[q.id]).length;
  let h=`<div class="hero">
    <div class="hero-tag">Quiz</div>
    <div class="hero-title">理解度チェック</div>
    <div class="hero-sub">3チャプター・計12問で知識を確認しましょう</div>
    <div class="hero-row">
      <div class="hero-stat"><div class="hero-stat-n">${dc}/3</div><div class="hero-stat-l">完了章数</div></div>
      <div class="hero-stat"><div class="hero-stat-n">12</div><div class="hero-stat-l">総問題数</div></div>
    </div>
    <div class="pbar-bg"><div class="pbar-fill" style="width:${Math.round(dc/3*100)}%"></div></div>
  </div>
  <div class="sec-label">チャプター選択</div>`;
  QUIZZES.forEach((qz,i)=>{
    const done=S.done[qz.id];const prev=i===0||S.done[QUIZZES[i-1].id];const locked=!prev;
    h+=`<div class="lesson-card${done?' read':''}" ${!locked?`onclick="startQuiz(${i})"`:''} style="${locked?'opacity:.5;cursor:default':''}">
      <div class="lesson-card-head">
        <div class="lesson-icon">${done?`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6ee7b7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:locked?`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(195,155,211,.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>`:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d8b4fe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`}</div>
        <div class="lesson-card-body">
          ${done?'<span class="lesson-read-pill">完了</span>':locked?'<span class="lesson-read-pill" style="background:rgba(255,255,255,.06);color:rgba(195,155,211,.5);border-color:rgba(255,255,255,.1)">ロック中</span>':''}
          <div class="lesson-card-title">${qz.tag}｜${qz.name}</div>
          <div class="lesson-card-desc">${qz.ch.length}問</div>
        </div>
        <div class="lesson-card-arr">›</div>
      </div>
    </div>`;
  });
  document.getElementById('app').innerHTML=h;
}
function startQuiz(i){S.quizView='playing';S.quizLi=i;S.quizCi=0;S.ans={};S.sel=null;S.fill='';initQ();renderQuizPlay()}
function initQ(){
  const ch=QUIZZES[S.quizLi].ch[S.quizCi];
  if(ch.t==='order'){
    const a=ch.items.map((_,i)=>i);
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    let t=0;while(a.every((v,i)=>v===ch.correct[i])&&t++<5)for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    S.ord=a;
  }
}
function renderQuizPlay(){
  const qz=QUIZZES[S.quizLi];const ch=qz.ch[S.quizCi];const tot=qz.ch.length;
  const ansd=S.ans[S.quizCi]!==undefined;
  const pct=Math.round(((S.quizCi+(ansd?1:0))/tot)*100);
  let h=`<button class="back" onclick="backQuiz()">← 一覧に戻る</button>
  <div class="sum-card">
    <div class="sum-num">${S.quizLi+1}</div>
    <div><div class="sum-tag">${qz.tag}</div><div class="sum-name">${qz.name}</div></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-label"><span>Q${S.quizCi+1}/${tot}</span><span>${pct}%</span></div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="ch-card">
    <div class="ch-head"><span class="ch-type ${ch.t}">${ch.k}</span><span class="ch-qnum">Q${S.quizCi+1}</span></div>
    <div class="ch-q">${ch.q}</div>`;
  if(ch.t==='choice'){
    h+=`<div class="opts">`;
    ch.opts.forEach((o,i)=>{
      let c='opt';
      if(ansd){if(i===ch.ans)c+=' correct';else if(i===S.sel&&i!==ch.ans)c+=' wrong';}
      h+=`<button class="${c}" ${ansd?'disabled':''} onclick="chkC(${i})"><span class="opt-mk">${['A','B','C','D'][i]}</span><span class="opt-txt">${o}</span></button>`;
    });
    h+=`</div>`;
  }else if(ch.t==='fill'){
    const a=S.ans[S.quizCi];const ic=a===undefined?'':a?'correct':'wrong';
    h+=`<div class="fill-row"><input id="fi" type="text" placeholder="${ch.ph||''}" value="${esca(S.fill)}" ${a!==undefined?'disabled':''} class="${ic}">${a===undefined?`<button class="btn btn-p" onclick="chkF()">確認</button>`:''}</div>`;
  }else if(ch.t==='order'){
    h+=`<div class="ord-list" id="ordlist">`;
    S.ord.forEach((oi,pos)=>{
      h+=`<div class="ord-item" draggable="true" data-pos="${pos}"><span class="ord-n">${pos+1}</span><span class="ord-txt">${esc(ch.items[oi])}</span><span class="ord-hdl">⋮⋮</span></div>`;
    });
    h+=`</div>${!ansd?`<button class="btn btn-p" onclick="chkOrd()">答え合わせ</button>`:''}`;
  }
  if(ansd){
    const ok=S.ans[S.quizCi];
    h+=`<div class="fb ${ok?'ok':'ng'}"><span class="fb-icon">${ok?'✓':'×'}</span><div><div class="fb-head">${ok?'正解！':'不正解'}</div><div>${ch.exp}</div></div></div>
    <div class="nav"><button class="btn btn-p" onclick="nextQ()">${S.quizCi+1<tot?'次の問題 →':'完了 →'}</button></div>`;
  }
  h+=`</div>`;
  document.getElementById('app').innerHTML=h;
  if(ch.t==='fill'){
    const inp=document.getElementById('fi');
    if(inp&&S.ans[S.quizCi]===undefined){inp.addEventListener('input',e=>S.fill=e.target.value);inp.addEventListener('keydown',e=>{if(e.key==='Enter')chkF()});inp.focus();}
  }
  if(ch.t==='order') setupDD();
}
function backQuiz(){S.quizView='list';renderQuizList()}
function chkC(i){S.sel=i;S.ans[S.quizCi]=(i===QUIZZES[S.quizLi].ch[S.quizCi].ans);renderQuizPlay()}
function chkF(){
  const ch=QUIZZES[S.quizLi].ch[S.quizCi];const v=S.fill.trim();
  const n=s=>s.toLowerCase().replace(/\s+/g,'').replace(/,/g,'');
  S.ans[S.quizCi]=ch.correct.some(c=>n(c)===n(v));renderQuizPlay();
}
function chkOrd(){S.ans[S.quizCi]=S.ord.every((v,i)=>v===QUIZZES[S.quizLi].ch[S.quizCi].correct[i]);renderQuizPlay()}
function nextQ(){
  if(S.quizCi+1<QUIZZES[S.quizLi].ch.length){S.quizCi++;S.sel=null;S.fill='';initQ();renderQuizPlay();}
  else{S.done[QUIZZES[S.quizLi].id]=true;save();S.quizView='comp';renderQuizComp();}
}
function renderQuizComp(){
  const qz=QUIZZES[S.quizLi];const isLast=S.quizLi===QUIZZES.length-1;const allDone=QUIZZES.every(q=>S.done[q.id]);
  let h=`<div class="comp"><div class="comp-ic"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div class="comp-title">${qz.tag} クリア！</div>
    <div class="comp-sub">${qz.name}の理解度チェック完了</div>
    <div class="comp-btns">
      ${!isLast?`<button class="btn btn-p" onclick="startQuiz(${S.quizLi+1})">次のチャプターへ →</button>`:''}
      <button class="btn" onclick="backQuiz()">一覧に戻る</button>
    </div>`;
  if(allDone) h+=`<div class="final"><strong>全チャプター完了！</strong><br>次は「面接想定問答」タブで実際の答え方を練習しましょう！</div>`;
  h+=`</div>`;
  document.getElementById('app').innerHTML=h;
}
function setupDD(){
  const area=document.getElementById('ordlist');if(!area)return;
  let dp=null;
  area.querySelectorAll('.ord-item').forEach(el=>{
    el.addEventListener('dragstart',e=>{dp=+el.dataset.pos;el.style.opacity='.4';e.dataTransfer.effectAllowed='move'});
    el.addEventListener('dragend',e=>{el.style.opacity='1';area.querySelectorAll('.ord-item').forEach(x=>x.classList.remove('drag-over-top','drag-over-bot'))});
    el.addEventListener('dragover',e=>{e.preventDefault();area.querySelectorAll('.ord-item').forEach(x=>x.classList.remove('drag-over-top','drag-over-bot'));const mid=el.getBoundingClientRect().top+el.offsetHeight/2;el.classList.add(e.clientY<mid?'drag-over-top':'drag-over-bot')});
    el.addEventListener('drop',e=>{e.preventDefault();const mid=el.getBoundingClientRect().top+el.offsetHeight/2;let tp=+el.dataset.pos;if(e.clientY>=mid)tp++;if(dp===null)return;const it=S.ord.splice(dp,1)[0];if(tp>dp)tp--;S.ord.splice(tp,0,it);dp=null;renderQuizPlay()});
  });
}

function renderInterview(){
  let h=`<div class="hero">
    <div class="hero-tag">Interview Prep</div>
    <div class="hero-title">面接想定問答</div>
    <div class="hero-sub">よく聞かれる質問と模範回答。声に出して練習しましょう。</div>
    <div class="hero-row">
      <div class="hero-stat"><div class="hero-stat-n">${INTERVIEWS.length}</div><div class="hero-stat-l">想定問答</div></div>
      <div class="hero-stat"><div class="hero-stat-n">声出し</div><div class="hero-stat-l">練習推奨</div></div>
    </div>
  </div>
  <div class="sec-label">想定問答 ${INTERVIEWS.length}問</div>`;
  INTERVIEWS.forEach((iv,i)=>{
    h+=`<div class="interview-box">
      <div class="interview-q">
        <span class="interview-q-icon">Q</span>
        <span>Q${i+1}｜${iv.q}</span>
      </div>
      <div class="interview-a">${iv.a}</div>
    </div>`;
  });
  h+=`<div class="tip-box" style="margin-top:8px"><strong>練習のコツ</strong><br>模範回答をそのまま暗記するより、「キーワード」だけ覚えて自分の言葉で話せるようにしましょう。ERPは「一元管理」、HUEは「日本企業向け・2,400社」、QAは「品質保証」が核心ワードです。</div>`;
  document.getElementById('app').innerHTML=h;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function esca(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;')}

render();
</script>
</body>
</html>
